apiVersion: v1
kind: ConfigMap
metadata:
  name: oj-config
  namespace: oj
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  API_PORT: "3001"
  JUDGE_CONCURRENCY: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: oj-secrets
  namespace: oj
type: Opaque
stringData:
  # 生产请改成强随机值
  POSTGRES_USER: "oj"
  POSTGRES_PASSWORD: "change-me"
  POSTGRES_DB: "oj"
  JWT_SECRET: "change-me-jwt-secret"
  DATABASE_URL: "postgresql://oj:change-me@postgres:5432/oj"
