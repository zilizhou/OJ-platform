apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: oj
spec:
  selector: { app: api }
  ports: [{ port: 3001, targetPort: 3001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: oj
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: oj/api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - { configMapRef: { name: oj-config } }
            - { secretRef: { name: oj-secrets } }
          ports: [{ containerPort: 3001 }]
          readinessProbe:
            httpGet: { path: /api/problems, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
